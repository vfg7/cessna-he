title: Powertrain file for the sizing of EcoPulse

power_train_components:
  propeller_1:
    id: fastga_he.pt_component.propeller
    position: in_the_nose  # "on_the_wing", "in_the_nose"
  propeller_elec_1:
    id: fastga_he.pt_component.propeller
    position: on_the_wing  # "on_the_wing", "in_the_nose"
    symmetrical: propeller_elec_2
  propeller_elec_2:
    id: fastga_he.pt_component.propeller
    position: on_the_wing  # "on_the_wing", "in_the_nose"
 
  motor_1:
    id: fastga_he.pt_component.pmsm
    position: on_the_wing  # "on_the_wing", "in_the_nose"
    symmetrical: motor_2
  motor_2:
    id: fastga_he.pt_component.pmsm
    position: on_the_wing  # "on_the_wing", "in_the_nose"

  inverter_1:
    id: fastga_he.pt_component.inverter
    position: inside_the_wing  # "inside_the_wing", "in_the_front", "in_the_back"
    symmetrical: inverter_2
  inverter_2:
    id: fastga_he.pt_component.inverter
    position: inside_the_wing  # "inside_the_wing", "in_the_front", "in_the_back"

  dc_bus_1:
    id: fastga_he.pt_component.dc_bus
    position: inside_the_wing  # "inside_the_wing", "in_the_front", "in_the_back"
    options:
      number_of_inputs: 1
      number_of_outputs: 1
    symmetrical: dc_bus_2
  dc_bus_2:
    id: fastga_he.pt_component.dc_bus
    position: inside_the_wing  # "inside_the_wing", "in_the_front", "in_the_back"
    options:
      number_of_inputs: 1
      number_of_outputs: 1
  
  harness_1:
    id: fastga_he.pt_component.dc_line
    position: inside_the_wing  # "inside_the_wing", "from_rear_to_front", "from_rear_to_wing", "from_front_to_wing", "from_rear_to_nose", "from_front_to_nose", "from_wing_to_nose"
    symmetrical: harness_2
  harness_2:
    id: fastga_he.pt_component.dc_line
    position: inside_the_wing  # "inside_the_wing", "from_rear_to_front", "from_rear_to_wing", "from_front_to_wing", "from_rear_to_nose", "from_front_to_nose", "from_wing_to_nose"

  bus_nose:
    id: fastga_he.pt_component.dc_bus
    position: in_the_front  # "inside_the_wing", "in_the_front", "in_the_back"
    options:
      number_of_inputs: 1
      number_of_outputs: 2

  dc_dc_converter_1:
    id: fastga_he.pt_component.dc_dc_converter
    position: in_the_front  # "inside_the_wing", "in_the_front", "in_the_back"
    
  battery_pack_1:
    id: fastga_he.pt_component.battery_pack
    position: underbelly  # "inside_the_wing", "wing_pod", "in_the_front", "in_the_back", "underbelly"
  
  gearbox_1:
    id: fastga_he.pt_component.speed_reducer
    position: in_the_front
  turboshaft_1:
    id: fastga_he.pt_component.turboshaft
    position: in_the_front  # "on_the_wing", "in_the_front", "in_the_back"

  fuel_system_1:
    id: fastga_he.pt_component.fuel_system
    options:
      number_of_engines: 1
      number_of_tanks: 2
    position: in_the_front  # "in_the_wing", "in_the_front", "in_the_back"

  fuel_tank_1:
    id: fastga_he.pt_component.fuel_tank
    position: inside_the_wing  # "inside_the_wing", "wing_pod", "in_the_fuselage"
  fuel_tank_2:
    id: fastga_he.pt_component.fuel_tank
    position: inside_the_wing  # "inside_the_wing", "wing_pod", "in_the_fuselage"
    symmetrical: fuel_tank_1


component_connections:
  - source: propeller_1
    target: [gearbox_1, 1]

  - source: [gearbox_1, 1]
    target: turboshaft_1

  - source: turboshaft_1
    target: [fuel_system_1, 1]

  - source: [fuel_system_1, 1]
    target: fuel_tank_1

  - source: [fuel_system_1, 2]
    target: fuel_tank_2

  - source: dc_dc_converter_1
    target: battery_pack_1

  - source: [bus_nose, 1]
    target: dc_dc_converter_1

  - source: harness_1
    target: [bus_nose, 1]

  - source: [dc_bus_1, 1]
    target: harness_1

  - source: inverter_1
    target: [dc_bus_1, 1]

  - source: motor_1
    target: inverter_1

  - source: propeller_elec_1
    target: motor_1

  - source: harness_2
    target: [bus_nose, 2]

  - source: [dc_bus_2, 1]
    target: harness_2

  - source: inverter_2
    target: [dc_bus_2, 1]

  - source: motor_2
    target: inverter_2

  - source: propeller_elec_2
    target: motor_2


watcher_file_path: ../results/turbo_electric_propulsion_pt_watcher_2.csv